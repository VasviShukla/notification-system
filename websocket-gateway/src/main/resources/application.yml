server:
  port: ${PORT:8083}

spring:
  application:
    name: websocket-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl: ${REDIS_SSL:false}

notification:
  redis:
    live-channel-prefix: "notif:live:"
    live-channel-pattern: "notif:live:*"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.notifsys: INFO
