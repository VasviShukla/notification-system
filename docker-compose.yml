version: "3.8"

# Fully local stack - no cloud accounts, no signups, $0.
# Run: docker compose up --build
# Then open frontend/index.html in a browser (defaults already point here).

services:

  # --- Infrastructure ---

  postgres:
    image: postgres:16-alpine
    container_name: notifsys-postgres
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifuser
      POSTGRES_PASSWORD: notifpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifuser -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: notifsys-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Single-node Kafka in KRaft mode - no Zookeeper needed.
  kafka:
    image: bitnami/kafka:3.7
    container_name: notifsys-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Web UI to watch topics/messages/consumer groups - great for demoing the pipeline.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: notifsys-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  # --- Application services ---

  producer-service:
    build: ./producer-service
    container_name: notifsys-producer
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  consumer-service:
    build: ./consumer-service
    container_name: notifsys-consumer
    ports:
      - "8082:8082"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: jdbc:postgresql://postgres:5432/notifications
      DATABASE_USERNAME: notifuser
      DATABASE_PASSWORD: notifpass
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_SSL: "false"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  websocket-gateway:
    build: ./websocket-gateway
    container_name: notifsys-gateway
    ports:
      - "8083:8083"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_SSL: "false"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
