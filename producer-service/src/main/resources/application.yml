server:
  port: ${PORT:8081}

spring:
  application:
    name: producer-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

notification:
  kafka:
    topic: notifications

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.notifsys: INFO
